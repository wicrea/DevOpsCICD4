name: CI Pipeline

on:
  pull_request:
    branches: ["dev"]

  push:
    branches: ["main"]

permissions:
  contents: read

jobs:
  dev-checks:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: "18"

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Install frontend dependencies
      run: |
        cd frontend && npm install

    - name: Install backend dependencies
      run: |
        cd backend && npm install

    - name: Lint frontend
      run: |
        cd frontend && npm run lint

    - name: Install Snyk CLI
      run: npm install -g snyk

    - name: Authenticate Snyk
      run: snyk auth ${{ secrets.SNYK_TOKEN }}

    - name: Security scan (Snyk)
      run: |
        cd backend && snyk test --severity-threshold=critical
        cd ../frontend && snyk test --severity-threshold=critical || true

    - name: Build Docker images
      run: docker compose build

  production-build:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Create .env
      run: |
        echo "APP_SECRET_NAME=${{ secrets.APP_SECRET_NAME }}" >> .env

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build Docker images
      run: docker compose build

    - name: Push backend image
      run: |
        docker push ${{ secrets.DOCKERHUB_USERNAME }}/devopscicd4-backend

    - name: Push frontend image
      run: |
        docker push ${{ secrets.DOCKERHUB_USERNAME }}/devopscicd4-frontend
